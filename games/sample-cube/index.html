<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Spin Cube — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:14px;align-items:center;
      padding:12px 16px;z-index:2;pointer-events:none}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto}
    .hud .sc{margin-left:auto;font-weight:800;font-size:1.5rem;text-shadow:0 0 14px rgba(108,140,255,.5)}
    .hud .best{color:#9aa3b5;font-size:.85rem;font-weight:600}
    .goal{position:fixed;top:calc(env(safe-area-inset-top) + 46px);left:0;right:0;text-align:center;
      z-index:2;pointer-events:none;color:#cdd3e0;font-size:.95rem}
    .goal b{color:#ffd36c}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 18px);left:0;right:0;text-align:center;
      color:#7d8493;font-size:.85rem;z-index:2;pointer-events:none}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    .flash{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity .3s;
      background:radial-gradient(circle at 50% 50%,rgba(90,209,168,.25),transparent 60%)}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← 3D</a>
    <span class="sc" id="score">0</span>
    <span class="best">Best: <b id="best">0</b></span></div>
  <div class="goal">Spin so the <b id="goalName">CORAL</b> face points at you, then lock</div>
  <div class="hint">drag / arrows — spin · space — lock face · R reset</div>
  <div class="flash" id="flash"></div>
  <!-- Three.js via ES module CDN — no build step needed. -->
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag } from './touch.js';

    // ---- deterministic LCG (seeded) ----
    let seed=0x2545F4>>>0;
    function rnd(){ seed=(1664525*seed+1013904223)>>>0; return seed/4294967296; }

    // ---- high score ----
    const BEST_KEY='gamf-3d-sample-cube-best';
    let best=+(localStorage.getItem(BEST_KEY)||0);
    document.getElementById('best').textContent=best;
    let score=0;

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const bgTex=(()=>{ const c=document.createElement('canvas'); c.width=4; c.height=256;
      const ctx=c.getContext('2d'); const g=ctx.createLinearGradient(0,0,0,256);
      g.addColorStop(0,'#1c2740'); g.addColorStop(0.55,'#12141d'); g.addColorStop(1,'#0a0b10');
      ctx.fillStyle=g; ctx.fillRect(0,0,4,256);
      const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; })();
    scene.background=bgTex;
    scene.fog=new THREE.Fog(0x0e0f13,6,16);

    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
    camera.position.z = 3.4;

    // six face colors / names. order matches BoxGeometry material index:
    // 0 +X, 1 -X, 2 +Y, 3 -Y, 4 +Z, 5 -Z
    const FACES=[
      {name:'CORAL',  col:0xff7a6c},
      {name:'MINT',   col:0x5ad1a8},
      {name:'AMBER',  col:0xffc24b},
      {name:'VIOLET', col:0x9d7cff},
      {name:'SKY',    col:0x4ec3ff},
      {name:'LIME',   col:0xa6e05a},
    ];
    const mats=FACES.map(f=>new THREE.MeshStandardMaterial({
      color:f.col, roughness:0.3, metalness:0.25,
      emissive:new THREE.Color(f.col).multiplyScalar(0.0) }));
    const cube = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,1.5,1,1,1), mats);
    cube.castShadow=true; scene.add(cube);
    // bevel-ish wire accent
    const edges=new THREE.LineSegments(new THREE.EdgesGeometry(cube.geometry),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.12}));
    cube.add(edges);

    scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x222a3a, 0.9));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(2.5,4,4);
    dir.castShadow=true; dir.shadow.mapSize.set(1024,1024); scene.add(dir);
    const rim = new THREE.DirectionalLight(0x6c8cff, 0.4); rim.position.set(-3,1,-4); scene.add(rim);

    // floor for a soft shadow
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.ShadowMaterial({opacity:0.3}));
    ground.rotation.x=-Math.PI/2; ground.position.y=-1.3; ground.receiveShadow=true; scene.add(ground);

    const flash=document.getElementById('flash');
    function doFlash(){ flash.style.opacity='1'; setTimeout(()=>flash.style.opacity='0',60); }

    // which face index currently points toward camera (+Z world)?
    const faceNormals=[
      new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
      new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
      new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1),
    ];
    const camDir=new THREE.Vector3(0,0,1);
    function facingIndex(){ let bi=0,bd=-2;
      for(let i=0;i<6;i++){ const n=faceNormals[i].clone().applyQuaternion(cube.quaternion);
        const d=n.dot(camDir); if(d>bd){ bd=d; bi=i; } }
      return {idx:bi,dot:bd}; }

    let goal=0;
    function newGoal(){ goal=Math.floor(rnd()*6);
      document.getElementById('goalName').textContent=FACES[goal].name;
      document.getElementById('goalName').style.color='#'+FACES[goal].col.toString(16).padStart(6,'0'); }
    newGoal();

    function setScore(s){ score=s; document.getElementById('score').textContent=score;
      if(score>best){ best=score; localStorage.setItem(BEST_KEY,best);
        document.getElementById('best').textContent=best; } }

    function lock(){
      const f=facingIndex();
      if(f.idx===goal && f.dot>0.86){ // close enough to facing us
        setScore(score+1); doFlash(); burst(FACES[goal].col); newGoal();
      } else { // wrong face: lose a point but not below 0
        setScore(Math.max(0,score-1));
      }
    }
    function reset(){ seed=0x2545F4>>>0; setScore(0); cube.quaternion.identity();
      velX=0.006; velY=0.008; newGoal(); }

    function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h);
      camera.aspect=w/h; camera.updateProjectionMatrix(); }
    addEventListener('resize', resize); resize();

    // ---- particle burst ----
    const sparks=[];
    function burst(col){
      const g=new THREE.SphereGeometry(0.04,6,6);
      const m=new THREE.MeshBasicMaterial({color:col});
      for(let i=0;i<14;i++){ const s=new THREE.Mesh(g,m); s.position.set(0,0,0.8);
        scene.add(s); sparks.push({mesh:s,vx:(rnd()-0.5)*0.08,vy:(rnd()-0.5)*0.08,
          vz:rnd()*0.06,life:30}); }
    }

    // ---- input: drag + keyboard ----
    let velX=0.006, velY=0.008, dragging=false;
    onDrag(renderer.domElement, {
      start:()=>{ dragging=true; },
      move:({dx,dy})=>{ velY=dx*0.006; velX=dy*0.006; },
      end:()=>{ dragging=false; }
    });
    const keys={};
    addEventListener('keydown',(e)=>{
      const k=e.key;
      const gameKey=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter',
        'w','a','s','d','W','A','S','D','r','R'].includes(k);
      if(gameKey) e.preventDefault();
      if(k==='r'||k==='R'){ reset(); return; }
      if(k===' '||k==='Enter'){ lock(); return; }
      keys[k]=true;
    });
    addEventListener('keyup',(e)=>{ keys[e.key]=false; });
    function keyboardSpin(){
      const sp=0.045; let kx=0,ky=0;
      if(keys['ArrowUp']||keys['w']||keys['W']) kx-=1;
      if(keys['ArrowDown']||keys['s']||keys['S']) kx+=1;
      if(keys['ArrowLeft']||keys['a']||keys['A']) ky-=1;
      if(keys['ArrowRight']||keys['d']||keys['D']) ky+=1;
      if(kx||ky){ velX=kx*sp; velY=ky*sp; }
    }

    function animate(){
      const kx=keys['ArrowUp']||keys['w']||keys['W']||keys['ArrowDown']||keys['s']||keys['S'];
      const ky=keys['ArrowLeft']||keys['a']||keys['A']||keys['ArrowRight']||keys['d']||keys['D'];
      const kbActive=kx||ky;
      if(kbActive) keyboardSpin();

      // apply rotation in world axes for predictable steering
      const qx=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),velX);
      const qy=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),velY);
      cube.quaternion.premultiply(qy).premultiply(qx);

      if(!dragging && !kbActive){ velX*=0.95; velY*=0.95;
        if(Math.abs(velX)<0.0006) velX=0.0009; if(Math.abs(velY)<0.0006) velY=0.0012; }

      // highlight: glow the goal face when it's facing us
      const f=facingIndex();
      for(let i=0;i<6;i++){ const isGoal=i===goal;
        const want = (isGoal && f.idx===goal) ? Math.max(0,(f.dot-0.6))*0.9 : (isGoal?0.12:0);
        const e=mats[i].emissive; const target=new THREE.Color(FACES[i].col).multiplyScalar(want);
        e.lerp(target,0.18); }

      for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i];
        s.mesh.position.x+=s.vx; s.mesh.position.y+=s.vy; s.mesh.position.z+=s.vz; s.vy-=0.003;
        s.life--; if(s.life<=0){ scene.remove(s.mesh); sparks.splice(i,1); } }

      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
