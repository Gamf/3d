<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- central column -->
  <rect x="150" y="26" width="20" height="150" rx="4" fill="#6f6a3b"/>
  <!-- stacked helix platforms (back to front), each a flat ellipse with a wedge gap -->
  <!-- platform 1 -->
  <path d="M160 56 a64 22 0 0 1 64 22 a64 22 0 0 1 -64 22 a64 22 0 0 1 -64 -22 a64 22 0 0 1 44 -20 z" fill="#c8923a"/>
  <!-- platform 2 -->
  <ellipse cx="160" cy="100" rx="64" ry="22" fill="#6f6a3b"/>
  <path d="M160 100 L213 88 a64 22 0 0 1 -3 19 z" fill="#efe6d2"/>
  <!-- platform 2 danger wedge -->
  <path d="M160 100 L100 92 a64 22 0 0 0 6 16 z" fill="#9b3a22"/>
  <!-- platform 3 -->
  <path d="M160 122 a64 22 0 0 1 64 22 a64 22 0 0 1 -64 22 a64 22 0 0 1 -54 -20 z" fill="#b6603f"/>
  <!-- platform 3 danger wedge -->
  <path d="M160 144 L218 132 a64 22 0 0 1 -4 18 z" fill="#9b3a22"/>
  <!-- bouncing ball -->
  <circle cx="118" cy="76" r="13" fill="#221f17"/>
  <circle cx="118" cy="76" r="11" fill="#f3ece0"/>
</svg>
