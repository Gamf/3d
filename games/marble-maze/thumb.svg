<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- ground -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- tilted wooden maze board (oxblood frame) -->
  <g transform="rotate(-6 160 100)">
    <rect x="48" y="40" width="224" height="124" rx="6" fill="#9b3a22"/>
    <rect x="60" y="52" width="200" height="100" rx="3" fill="#6f4a2a"/>
    <!-- maze walls (olive) -->
    <rect x="84" y="52" width="9" height="62" fill="#6f6a3b"/>
    <rect x="84" y="105" width="70" height="9" fill="#6f6a3b"/>
    <rect x="120" y="64" width="9" height="50" fill="#6f6a3b"/>
    <rect x="156" y="52" width="9" height="44" fill="#6f6a3b"/>
    <rect x="156" y="88" width="60" height="9" fill="#6f6a3b"/>
    <rect x="207" y="96" width="9" height="56" fill="#6f6a3b"/>
    <rect x="180" y="120" width="48" height="9" fill="#6f6a3b"/>
    <!-- dark drilled holes -->
    <circle cx="108" cy="135" r="9" fill="#221f17"/>
    <circle cx="190" cy="68" r="9" fill="#221f17"/>
    <circle cx="240" cy="138" r="9" fill="#221f17"/>
    <!-- goal pad (ochre) -->
    <circle cx="236" cy="70" r="13" fill="#c8923a"/>
    <circle cx="236" cy="70" r="6" fill="#6f4a2a"/>
    <!-- steel marble + its shadow -->
    <ellipse cx="98" cy="78" rx="13" ry="6" fill="#221f17" opacity="0.28"/>
    <circle cx="96" cy="72" r="13" fill="#cfd2d6"/>
    <circle cx="91" cy="67" r="4" fill="#f3ece0"/>
  </g>
</svg>
