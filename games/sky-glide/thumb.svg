<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- sky -->
  <rect width="320" height="200" fill="#f3ece0"/>
  <!-- ground band -->
  <rect y="166" width="320" height="34" fill="#c8923a"/>
  <rect y="166" width="320" height="6" fill="#6f6a3b"/>
  <!-- a couple of flat clouds -->
  <ellipse cx="70" cy="44" rx="30" ry="13" fill="#efe6d2"/>
  <ellipse cx="96" cy="40" rx="20" ry="11" fill="#efe6d2"/>
  <!-- pipe pair forming a gap (the classic obstacle), olive/ochre -->
  <rect x="222" y="0" width="46" height="64" fill="#6f6a3b"/>
  <rect x="216" y="56" width="58" height="18" fill="#221f17" opacity="0.18"/>
  <rect x="216" y="58" width="58" height="14" fill="#6f6a3b"/>
  <rect x="222" y="132" width="46" height="68" fill="#6f6a3b"/>
  <rect x="216" y="126" width="58" height="18" fill="#221f17" opacity="0.18"/>
  <rect x="216" y="128" width="58" height="14" fill="#6f6a3b"/>
  <!-- the bird flapping toward the gap -->
  <g transform="translate(116 100)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="34" ry="29" fill="#c8923a"/>
    <!-- belly -->
    <ellipse cx="2" cy="10" rx="22" ry="16" fill="#efe6d2"/>
    <!-- wing -->
    <path d="M -4 -2 L -40 -22 L -30 8 Z" fill="#9b3a22"/>
    <!-- eye -->
    <circle cx="16" cy="-9" r="9" fill="#efe6d2"/>
    <circle cx="19" cy="-9" r="4.5" fill="#221f17"/>
    <!-- beak -->
    <path d="M 30 -2 L 52 2 L 30 10 Z" fill="#9b3a22"/>
  </g>
</svg>
