<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#15110e">
  <title>Crossy — Gamf</title>
  <meta name="description" content="Hop forward across busy roads and rushing rivers. One more lane, one more point — how far can you get?">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../gamf.css">
  <style>
    /* genre accent for this game (3D = mint) */
    body { --gx-accent: #5ad1a8; }
    html, body { height: 100%; overflow: hidden; touch-action: none;
      -webkit-user-select: none; user-select: none; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    /* "GET READY" tap-to-start flash (cosmetic, no interaction) */
    .cy-flash { position: fixed; left: 0; right: 0; top: calc(env(safe-area-inset-top) + 70px);
      text-align: center; z-index: 4; pointer-events: none;
      font-family: var(--gx-font-display); font-weight: 400; font-size: clamp(24px, 6vw, 40px);
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--gx-amber);
      opacity: 0; transform: translateY(-6px); transition: opacity .25s ease, transform .25s ease; }
    .cy-flash.show { opacity: 1; transform: translateY(0); animation: gx-blink 1.2s steps(1) infinite; }
  </style>
</head>
<body class="gx">
  <script src="../../gamf-icons.js"></script>

  <!-- top HUD -->
  <header class="gx-hud">
    <a class="gx-hud__back" href="../../"><svg class="gx-ico"><use href="#i-back"/></svg> 3D</a>
    <span class="gx-hud__spacer"></span>
    <span class="gx-pill">Score <b id="score">0</b></span>
    <span class="gx-pill gx-pill--best"><svg class="gx-ico" style="width:1em;height:1em"><use href="#i-trophy"/></svg> <b id="best">0</b></span>
  </header>

  <!-- tap-to-start flash -->
  <div class="cy-flash" id="flash">Tap to hop</div>

  <!-- controls hint -->
  <div class="gx-hint">
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-up"/></svg> tap — hop forward</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-left"/></svg><svg class="gx-ico"><use href="#i-right"/></svg> swipe / arrows / WASD</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-pause"/></svg> P pause</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-restart"/></svg> R restart</span>
  </div>

  <!-- pause / game-over modal -->
  <div class="gx-modal" id="over">
    <div class="gx-modal__card">
      <h2 class="gx-modal__title" id="overTitle">Game over</h2>
      <div class="gx-modal__row">Score <b id="finalScore">0</b></div>
      <div class="gx-modal__row">Best <b id="bestScore">0</b></div>
      <div class="gx-modal__new" id="newBest"></div>
      <button class="gx-btn gx-btn--primary" id="again"><svg class="gx-ico"><use href="#i-restart"/></svg> <span id="againLabel">Play again</span></button>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onTap, onSwipe } from './touch.js';

    // ---------------------------------------------------------------- seeded LCG
    // No Math.random / Date — the whole world is generated deterministically.
    let seed = 0x9E3779B1 >>> 0;
    function srnd(){ seed = (1664525 * seed + 1013904223) >>> 0; return seed / 4294967296; }
    function srange(a, b){ return a + (b - a) * srnd(); }
    function spick(arr){ return arr[Math.floor(srnd() * arr.length)]; }
    function schance(p){ return srnd() < p; }

    // ---------------------------------------------------------------- high score
    const BEST_KEY = 'gamf-3d-crossy-best';
    let best = +(localStorage.getItem(BEST_KEY) || 0) || 0;
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const flashEl = document.getElementById('flash');
    bestEl.textContent = best;

    // ---------------------------------------------------------------- palette
    const COL = {
      bg:    0x15110e,
      grass: 0x4f7a3a,  grass2: 0x436b32,
      road:  0x2a2622,  road2:  0x322d28,
      water: 0x2c5f7a,  water2: 0x346a86,
      log:   0x7a4a28,
      bone:  0xf4ede1,
      red:   0xd8412b,  amber:  0xe8a23a, mint: 0x5ad1a8,
      rail:  0x36281d
    };
    const CAR_COLORS = [0xd8412b, 0xe8a23a, 0xc9c2b4, 0x6f9bd1, 0x9a6fd1, 0x5ad1a8];

    // ---------------------------------------------------------------- grid config
    const TILE = 1;          // world units per cell
    const COLS = 9;          // playable columns (x)
    const HALF = (COLS - 1) / 2;
    const ROW_AHEAD = 16;    // rows generated in front of the hopper
    const ROW_BEHIND = 6;    // rows kept behind before culling

    // ---------------------------------------------------------------- renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.12;
    document.body.appendChild(renderer.domElement);

    // ---------------------------------------------------------------- scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(COL.bg);
    scene.fog = new THREE.Fog(COL.bg, 22, 40);

    // Isometric-ish orthographic camera (classic crossy look).
    const VIEW = 9.5;
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 200);
    const CAM_OFF = new THREE.Vector3(7, 11, 7);   // relative to focus
    camera.position.copy(CAM_OFF);

    // ---------------------------------------------------------------- lights
    scene.add(new THREE.HemisphereLight(0xfff4e0, 0x2a2018, 0.85));
    const sun = new THREE.DirectionalLight(0xfff1d8, 1.25);
    sun.position.set(-8, 18, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
    sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
    sun.shadow.camera.top = 22; sun.shadow.camera.bottom = -10;
    sun.shadow.bias = -0.0004;
    scene.add(sun);
    const sunTarget = new THREE.Object3D();
    scene.add(sunTarget);
    sun.target = sunTarget;

    // ---------------------------------------------------------------- shared geometry / materials
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    function mat(hex, opts = {}){
      return new THREE.MeshStandardMaterial({
        color: hex, roughness: opts.rough ?? 0.85, metalness: opts.metal ?? 0.0,
        emissive: opts.emissive ?? 0x000000, emissiveIntensity: opts.ei ?? 0
      });
    }

    // ---------------------------------------------------------------- player (a little blocky chicken-ish hopper)
    const player = new THREE.Group();
    (() => {
      const body = new THREE.Mesh(boxGeo, mat(COL.bone, { rough: 0.7 }));
      body.scale.set(0.52, 0.42, 0.52); body.position.y = 0.27;
      body.castShadow = true;
      const head = new THREE.Mesh(boxGeo, mat(COL.bone, { rough: 0.7 }));
      head.scale.set(0.4, 0.4, 0.4); head.position.set(0, 0.62, 0.04);
      head.castShadow = true;
      const beak = new THREE.Mesh(boxGeo, mat(COL.amber, { rough: 0.6 }));
      beak.scale.set(0.14, 0.12, 0.18); beak.position.set(0, 0.6, 0.27);
      const comb = new THREE.Mesh(boxGeo, mat(COL.red, { rough: 0.6 }));
      comb.scale.set(0.1, 0.16, 0.2); comb.position.set(0, 0.86, 0.02);
      const eyeL = new THREE.Mesh(boxGeo, mat(0x1b0f0c));
      eyeL.scale.set(0.08, 0.08, 0.06); eyeL.position.set(0.12, 0.66, 0.2);
      const eyeR = eyeL.clone(); eyeR.position.x = -0.12;
      player.add(body, head, beak, comb, eyeL, eyeR);
    })();
    scene.add(player);
    // subtle ground shadow disc so the hopper reads while airborne
    const blob = new THREE.Mesh(
      new THREE.CircleGeometry(0.32, 18),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22 })
    );
    blob.rotation.x = -Math.PI / 2; blob.position.y = 0.02;
    scene.add(blob);

    // ---------------------------------------------------------------- world container
    const world = new THREE.Group();
    scene.add(world);

    // Each row: { z, type:'grass'|'road'|'water', mesh(Group), movers:[], dir, speed, gap, decor:[] }
    const rows = new Map();   // keyed by integer row index (z = -row)

    // pooled mover meshes get rebuilt per row (small counts, fine for this scale)
    function makeCar(hex){
      const g = new THREE.Group();
      const base = new THREE.Mesh(boxGeo, mat(hex, { rough: 0.5, metal: 0.1 }));
      base.scale.set(0.92, 0.42, 0.62); base.position.y = 0.27; base.castShadow = true;
      const cab = new THREE.Mesh(boxGeo, mat(hex, { rough: 0.5, metal: 0.1 }));
      cab.scale.set(0.5, 0.34, 0.58); cab.position.set(-0.08, 0.6, 0); cab.castShadow = true;
      const glass = new THREE.Mesh(boxGeo, mat(0x10131a, { rough: 0.3, metal: 0.4 }));
      glass.scale.set(0.51, 0.22, 0.5); glass.position.set(-0.08, 0.62, 0);
      const lightF = new THREE.Mesh(boxGeo, mat(COL.amber, { emissive: COL.amber, ei: 0.8 }));
      lightF.scale.set(0.06, 0.12, 0.12); lightF.position.set(0.46, 0.27, 0.18);
      const lightF2 = lightF.clone(); lightF2.position.z = -0.18;
      g.add(base, cab, glass, lightF, lightF2);
      return g;
    }
    function makeLog(len){
      const g = new THREE.Group();
      const body = new THREE.Mesh(boxGeo, mat(COL.log, { rough: 0.9 }));
      body.scale.set(len * 0.96, 0.36, 0.74); body.position.y = 0.16; body.castShadow = true;
      const top = new THREE.Mesh(boxGeo, mat(0x8a5a34, { rough: 0.9 }));
      top.scale.set(len * 0.96, 0.1, 0.74); top.position.y = 0.36;
      g.add(body, top);
      return g;
    }
    function makeTree(){
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(boxGeo, mat(0x6e4423, { rough: 0.95 }));
      trunk.scale.set(0.3, 0.5, 0.3); trunk.position.y = 0.25; trunk.castShadow = true;
      const top = new THREE.Mesh(boxGeo, mat(0x3c6630, { rough: 0.9 }));
      const h = srange(0.7, 1.2);
      top.scale.set(0.7, h, 0.7); top.position.y = 0.5 + h / 2; top.castShadow = true;
      g.add(trunk, top);
      return g;
    }
    function makeLilypad(){
      const m = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.42, 0.08, 12),
        mat(0x3f7a45, { rough: 0.9 })
      );
      m.position.y = 0.08;
      return m;
    }

    function tileRow(z, hex){
      const g = new THREE.Mesh(
        new THREE.BoxGeometry(COLS + 6, 0.5, 1),
        mat(hex, { rough: 0.92 })
      );
      g.position.set(0, -0.25, z);
      g.receiveShadow = true;
      return g;
    }

    // ---------------------------------------------------------------- row generation
    let furthestRow = 0;   // largest row index that has been built

    function buildRow(idx){
      if (rows.has(idx)) return;
      const z = -idx;
      const grp = new THREE.Group();
      let type, dir = 0, speed = 0, gap = 3;
      const movers = [];
      const occupied = new Set();   // safe columns blocked by trees (grass only)

      // Start zone: first few rows are always safe grass.
      if (idx <= 2){
        type = 'grass';
        grp.add(tileRow(z, idx % 2 ? COL.grass : COL.grass2));
      } else {
        // bias toward roads/water as the run climbs, but keep a few grass breathers
        const r = srnd();
        const diff = Math.min(1, idx / 90);
        if (r < 0.30 - diff * 0.12) type = 'grass';
        else if (r < 0.66) type = 'road';
        else type = 'water';

        if (type === 'grass'){
          grp.add(tileRow(z, idx % 2 ? COL.grass : COL.grass2));
          // scatter trees as obstacles, but never block every column
          for (let c = -HALF; c <= HALF; c++){
            if (schance(0.18)){
              const t = makeTree();
              t.position.set(c, 0, z);
              grp.add(t);
              occupied.add(c);
            }
          }
          // guarantee at least one open column near the middle
          if (occupied.size >= COLS){ occupied.clear(); }
        } else if (type === 'road'){
          grp.add(tileRow(z, idx % 2 ? COL.road : COL.road2));
          dir = schance(0.5) ? 1 : -1;
          speed = srange(0.022, 0.05) + diff * 0.02;
          gap = srange(3.2, 5.2) - diff * 0.6;
          const n = Math.max(1, Math.floor((COLS + 6) / gap));
          for (let i = 0; i < n; i++){
            const car = makeCar(spick(CAR_COLORS));
            const x = -HALF - 3 + i * gap + srange(-0.3, 0.3);
            car.position.set(x, 0, z);
            car.rotation.y = dir > 0 ? 0 : Math.PI;
            grp.add(car);
            movers.push(car);
          }
        } else { // water
          grp.add(tileRow(z, idx % 2 ? COL.water : COL.water2));
          dir = schance(0.5) ? 1 : -1;
          speed = srange(0.018, 0.04) + diff * 0.014;
          gap = srange(3.0, 4.6);
          const n = Math.max(2, Math.floor((COLS + 6) / gap));
          for (let i = 0; i < n; i++){
            const len = Math.floor(srange(2, 4));
            const log = makeLog(len);
            const x = -HALF - 3 + i * gap;
            log.position.set(x, 0, z);
            log.userData.len = len;
            grp.add(log);
            movers.push(log);
          }
          // a couple of decorative static lilypads at the edges
          if (schance(0.5)){
            const lp = makeLilypad(); lp.position.set(HALF + srange(1.5, 2.5), 0, z); grp.add(lp);
          }
        }
      }

      grp.position.y = 0;
      world.add(grp);
      rows.set(idx, { z, type, mesh: grp, movers, dir, speed, occupied });
      if (idx > furthestRow) furthestRow = idx;
    }

    function ensureRowsAround(centerIdx){
      for (let i = centerIdx - ROW_BEHIND; i <= centerIdx + ROW_AHEAD; i++){
        if (i >= 0) buildRow(i);
      }
      // cull rows far behind
      for (const [i, row] of rows){
        if (i < centerIdx - ROW_BEHIND - 2){
          world.remove(row.mesh);
          row.mesh.traverse(o => { if (o.geometry && o.geometry !== boxGeo) o.geometry.dispose(); });
          rows.delete(i);
        }
      }
    }

    // ---------------------------------------------------------------- game state
    let col, rowIdx;             // logical position of the hopper (cell)
    let hopFrom, hopTo;          // world-space hop interpolation endpoints
    let hopT;                    // 0..1 progress of current hop (>=1 = idle)
    let onLog;                   // reference to the log we're riding (water)
    let logOffsetX;              // x offset relative to the log we ride
    let score, over, paused, started, idle;
    let camFocus = new THREE.Vector3();
    let shake = 0;
    let deathKind = '';          // 'car' | 'water'

    const HOP_FRAMES = 9;

    function resetState(){
      seed = 0x9E3779B1 >>> 0;
      rows.forEach(r => world.remove(r.mesh));
      rows.clear();
      furthestRow = 0;
      col = 0; rowIdx = 0;
      score = 0; over = false; paused = false; started = false; idle = true;
      onLog = null; logOffsetX = 0; shake = 0; deathKind = '';
      ensureRowsAround(0);
      placePlayer(true);
      camFocus.set(0, 0, 0);
      camera.position.copy(camFocus).add(CAM_OFF);
      camera.lookAt(camFocus.x, 0, camFocus.z);
      hopFrom = playerTarget(); hopTo = hopFrom.clone(); hopT = 1;
      setScore();
      flashEl.classList.add('show');
      overEl.classList.remove('gx-show');
    }

    function playerTarget(){
      return new THREE.Vector3(col, 0, -rowIdx);
    }
    function placePlayer(snap){
      const t = playerTarget();
      player.position.set(t.x, 0, t.z);
    }

    function setScore(){
      const s = Math.max(0, rowIdx);
      if (s !== score){ score = s; scoreEl.textContent = score; }
    }

    // ---------------------------------------------------------------- hopping
    function tryHop(dx, dz){
      if (over || paused) return;
      if (hopT < 1) return;          // already mid-hop
      if (started === false){ started = true; idle = false; flashEl.classList.remove('show'); }

      const nextCol = col + dx;
      const nextRow = rowIdx + dz;

      // bounds: can't hop off the playable strip sideways
      if (nextCol < -HALF || nextCol > HALF) return;
      // can't hop backward past the start
      if (nextRow < 0) return;

      // a tree in the destination grass cell blocks the hop
      const destRow = rows.get(nextRow);
      if (destRow && destRow.type === 'grass' && destRow.occupied && destRow.occupied.has(nextCol)) return;

      // commit the hop
      onLog = null;
      const fromX = onLogPrevX();
      col = nextCol; rowIdx = nextRow;
      hopFrom = new THREE.Vector3(fromX, 0, player.position.z);
      hopTo = new THREE.Vector3(col, 0, -rowIdx);
      hopT = 0;
      // face the hop direction
      if (dz > 0) hopFacing = 0;
      else if (dz < 0) hopFacing = Math.PI;
      else if (dx > 0) hopFacing = Math.PI / 2;
      else if (dx < 0) hopFacing = -Math.PI / 2;

      ensureRowsAround(rowIdx);
      setScore();
    }
    let hopFacing = 0;

    function onLogPrevX(){
      // current visual x (so a hop off a moving log starts from the right place)
      return player.position.x;
    }

    // ---------------------------------------------------------------- death
    function die(kind){
      if (over) return;
      over = true; started = false; idle = false; deathKind = kind;
      shake = 14;
      const isBest = score > best;
      if (isBest){ best = score; localStorage.setItem(BEST_KEY, best); bestEl.textContent = best; }
      finalScoreEl.textContent = score;
      bestScoreEl.textContent = best;
      newBestEl.textContent = (isBest && score > 0) ? 'New best!' : '';
      overTitle.textContent = kind === 'water' ? 'Splash!' : 'Squashed!';
      againLabel.textContent = 'Play again';
      // small drop animation handled in loop via deathKind
      setTimeout(() => overEl.classList.add('gx-show'), 520);
    }

    // ---------------------------------------------------------------- pause / restart
    const overEl = document.getElementById('over');
    const overTitle = document.getElementById('overTitle');
    const againLabel = document.getElementById('againLabel');
    const finalScoreEl = document.getElementById('finalScore');
    const bestScoreEl = document.getElementById('bestScore');
    const newBestEl = document.getElementById('newBest');

    function togglePause(){
      if (over || !started) return;
      paused = !paused;
      if (paused){
        overTitle.textContent = 'Paused';
        finalScoreEl.textContent = score;
        bestScoreEl.textContent = best;
        newBestEl.textContent = '';
        againLabel.textContent = 'Resume';
        overEl.classList.add('gx-show');
      } else {
        overEl.classList.remove('gx-show');
      }
    }
    function primaryAction(){
      if (paused){ togglePause(); return; }
      resetState();
    }
    function restart(){ resetState(); }

    // ---------------------------------------------------------------- input
    onTap(renderer.domElement, () => {
      if (over){ primaryAction(); return; }
      if (paused){ return; }
      tryHop(0, 1);   // a plain tap = hop forward
    });
    onSwipe(renderer.domElement, (d) => {
      if (over || paused) return;
      if (d === 'up')    tryHop(0, 1);
      else if (d === 'down')  tryHop(0, -1);
      else if (d === 'left')  tryHop(-1, 0);
      else if (d === 'right') tryHop(1, 0);
    }, 24);

    const GAME_KEYS = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Enter',
      'a','d','w','s','A','D','W','S','p','P','r','R'];
    addEventListener('keydown', (e) => {
      const k = e.key;
      if (GAME_KEYS.includes(k)) e.preventDefault();
      if (k === 'r' || k === 'R'){ restart(); return; }
      if (k === 'p' || k === 'P'){ togglePause(); return; }
      if (over || paused){
        if (k === ' ' || k === 'Enter') primaryAction();
        return;
      }
      if (k === 'ArrowUp'    || k === 'w' || k === 'W' || k === ' ' || k === 'Enter'){ tryHop(0, 1); return; }
      if (k === 'ArrowDown'  || k === 's' || k === 'S'){ tryHop(0, -1); return; }
      if (k === 'ArrowLeft'  || k === 'a' || k === 'A'){ tryHop(-1, 0); return; }
      if (k === 'ArrowRight' || k === 'd' || k === 'D'){ tryHop(1, 0); return; }
    });
    document.getElementById('again').addEventListener('click', (e) => {
      e.stopPropagation(); primaryAction();
    });

    // ---------------------------------------------------------------- resize
    function resize(){
      const w = innerWidth, h = innerHeight;
      renderer.setSize(w, h);
      const aspect = w / h;
      camera.left = -VIEW * aspect; camera.right = VIEW * aspect;
      camera.top = VIEW; camera.bottom = -VIEW;
      camera.updateProjectionMatrix();
    }
    addEventListener('resize', resize); resize();

    // ---------------------------------------------------------------- main loop
    let t = 0;
    const WRAP = HALF + 4;   // movers wrap when off the strip
    function animate(){
      requestAnimationFrame(animate);
      t += 1;

      if (!paused){
        // advance movers in every live row (even when idle, the world breathes)
        for (const [, row] of rows){
          if (!row.movers.length || row.type === 'grass') continue;
          for (const m of row.movers){
            m.position.x += row.speed * row.dir;
            if (row.dir > 0 && m.position.x > WRAP) m.position.x = -WRAP;
            else if (row.dir < 0 && m.position.x < -WRAP) m.position.x = WRAP;
          }
        }
      }

      if (started && !over && !paused){
        // hop interpolation with a little parabolic arc
        if (hopT < 1){
          hopT = Math.min(1, hopT + 1 / HOP_FRAMES);
          const e = hopT;
          player.position.x = hopFrom.x + (hopTo.x - hopFrom.x) * e;
          player.position.z = hopFrom.z + (hopTo.z - hopFrom.z) * e;
          player.position.y = Math.sin(e * Math.PI) * 0.45;
          // squash/stretch
          const s = 1 + Math.sin(e * Math.PI) * 0.12;
          player.scale.set(1 / s * 1.04, s, 1 / s * 1.04);
        } else {
          player.scale.set(1, 1, 1);
        }
        player.rotation.y += (hopFacing - player.rotation.y) * 0.4;

        // resolve interactions once the hop lands
        if (hopT >= 1){
          const cur = rows.get(rowIdx);
          if (cur){
            if (cur.type === 'road'){
              // car collision (AABB-ish on x, generous z already aligned)
              for (const car of cur.movers){
                if (Math.abs(car.position.x - player.position.x) < 0.78){ die('car'); break; }
              }
              onLog = null;
            } else if (cur.type === 'water'){
              // must be standing on a log, else splash
              let ride = null;
              for (const log of cur.movers){
                const len = log.userData.len || 2;
                if (Math.abs(log.position.x - player.position.x) < len / 2 + 0.1){ ride = log; break; }
              }
              if (!ride){ if (!over) die('water'); }
              else {
                if (onLog !== ride){ onLog = ride; logOffsetX = player.position.x - ride.position.x; }
              }
            } else {
              onLog = null;
            }
          }
          // ride a log: move with it, and drown if it carries us off-screen
          if (onLog && rows.get(rowIdx) && rows.get(rowIdx).type === 'water'){
            player.position.x = onLog.position.x + logOffsetX;
            col = Math.round(player.position.x);
            if (player.position.x < -WRAP + 0.5 || player.position.x > WRAP - 0.5){ die('water'); }
          }
        }
      }

      // death animations
      if (over){
        if (deathKind === 'water'){
          player.position.y -= 0.03; if (player.position.y < -0.6) player.position.y = -0.6;
        } else {
          player.scale.y += (0.12 - player.scale.y) * 0.25;   // flatten
          player.scale.x += (1.5 - player.scale.x) * 0.2;
          player.scale.z += (1.5 - player.scale.z) * 0.2;
        }
      }

      // blob shadow follows ground position
      blob.position.x = player.position.x;
      blob.position.z = player.position.z;
      blob.material.opacity = 0.22 * Math.max(0, 1 - player.position.y * 1.4);

      // camera follows forward progress (locks x to centre-ish, only scrolls in z)
      const focusZ = -rowIdx;
      camFocus.x += (player.position.x * 0.25 - camFocus.x) * 0.08;
      camFocus.z += (focusZ - camFocus.z) * 0.12;
      let sx = 0, sz = 0;
      if (shake > 0){ sx = (srnd() - 0.5) * shake * 0.03; sz = (srnd() - 0.5) * shake * 0.03; shake *= 0.86; if (shake < 0.2) shake = 0; }
      camera.position.set(camFocus.x + CAM_OFF.x + sx, CAM_OFF.y, camFocus.z + CAM_OFF.z + sz);
      camera.lookAt(camFocus.x, 0, camFocus.z);
      sunTarget.position.set(camFocus.x, 0, camFocus.z);
      sun.position.set(camFocus.x - 8, 18, camFocus.z + 6);

      renderer.render(scene, camera);
    }

    resetState();
    animate();
  </script>
</body>
</html>
